name: Publish to npm

# Publishes to npm when a GitHub Release is published.
# A pre-release publishes under the "beta" dist-tag, otherwise "latest".
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm publish runs the "prepublishOnly" script (lint + build) automatically.
      - name: Publish
        run: npm publish ${{ github.event.release.prerelease && '--tag beta' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
