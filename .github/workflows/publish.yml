name: Publish to npm

# Publishes to npm when a GitHub Release is published.
# Uses npm Trusted Publishing (OIDC) - no NPM_TOKEN secret required.
# A pre-release publishes under the "beta" dist-tag, otherwise "latest".
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest # trusted publishing requires a GitHub-hosted runner

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires npm >= 11.5.1; the bundled npm may be older.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # npm publish runs the "prepublishOnly" script (lint + build) automatically.
      # No NODE_AUTH_TOKEN: authentication happens via OIDC trusted publishing.
      - name: Publish
        run: npm publish ${{ github.event.release.prerelease && '--tag beta' || '' }}
